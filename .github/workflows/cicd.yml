name: Deploy Node Application

on: 
  push:
    branches:
      - mern-ec2-docker

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
      - name: login to docker hub
        run: docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}
      - name: Build Docker Image
        run: docker build -t neethusa/verbofly-server .
      - name: Publish Image to docker hub
        run: docker push neethusa/verbofly-server:latest

  deploy:
    needs: build
    runs-on: self-hosted 
    steps:
      - name: Pull imgae from docker hub
        run: docker pull neethusa/verbofly-server:latest
      - name: Run Docker Container
        run: docker run -d -p 3002:3002 --name verbofly-server-container -e MONGO_PASSWORD='${{ secrets.MONGO_PASSWORD }}' neethusa/verbofly-server